name: CIP Daily Research Pipeline

on:
  schedule:
    - cron: '17 3 * * *'  # 3:17am UTC daily
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tsx
        run: npm install -g tsx

      - name: Run CIP Daily Research
        run: tsx scripts/cip-daily-research.mts

      - name: Check for findings
        id: findings
        run: |
          if [ -f ~/.config/local-router/cip-findings.jsonl ]; then
            COUNT=$(wc -l < ~/.config/local-router/cip-findings.jsonl)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue for Findings
        if: steps.findings.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync(
              require('os').homedir() + '/.config/local-router/cip-findings.jsonl',
              'utf8'
            ).split('\n').filter(Boolean).map(l => JSON.parse(l));

            const body = findings.map(f =>
              `- **${f.type}** (${f.model}): ${f.rec}\n  Confidence: ${f.conf}`
            ).join('\n\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CIP Daily Report — ${new Date().toISOString().slice(0, 10)}`,
              body: `## CIP Research Findings\n\n${findings.length} findings from today's telemetry analysis:\n\n${body}\n\n---\n🤖 Generated by CIP Daily Research Pipeline`,
              labels: ['cip', 'auto-research']
            });
